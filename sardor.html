<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="bg-[#2B2B2B]">
        <!-- Header -->
        <div class="lg:max-w-7xl flex justify-between pt-5 items-center md:max-w-2xl max-w-2xs mx-auto">
            <div>
                <img src="./img/logo.png" alt="">
            </div>
            <div class="lg:flex hidden gap-10 items-center">
                <p class="font-semibold text-base text-[#FFFFFF]">
                    Marketplace
                </p>
                <p class="font-semibold text-base text-[#FFFFFF]">
                    Rankings
                </p>
                <p class="font-semibold text-base text-[#FFFFFF]">
                    Connect a wallet
                </p>
                <div class="flex gap-1 items-center p-1 px-4 rounded-2xl hover:bg-[#A259FF] border border-[#A259FF]">
                    <i class="fa-regular fa-user text-white"></i>
                    <p class="font-semibold text-base text-[#FFFFFF]">
                        Sign Up
                    </p>
                </div>
            </div>
            <div class="lg:hidden">
                <i class="fa-solid fa-bars-staggered text-white"></i>
            </div>
        </div>
        <!--/Header-->

        <div class="lg:max-w-6xl  pt-5 items-center md:max-w-2xl max-w-2xs mx-auto">
            <p class="font-semibold lg:text-5xl md:text-4xl text-2xl text-white ">
                Top Creators
            </p>
            <p class="font-normal mt-2 lg:text-xl text-base text-white">
                Check out top ranking NFT artists on <br class="md:hidden block"> the NFT Marketplace.
            </p>
            
        </div>

        <div class="lg:max-w-6xl flex mt-10 justify-between md:max-w-2xl max-w-2xs mx-auto">
            <div class="flex gap-2 md:p-3 p-1 hover:border-[#858584] border-b-2 border-[#3B3B3B] items-center ">
                <p class="font-semibold px-7 lg:text-2xl text-base text-white ">
                    Created
                </p>
                
            </div>

            <div class="flex  gap-2 md:p-3 p-1 hover:border-[#858584] border-b-2 border-[#3B3B3B] items-center ">
                <p class="font-semibold px-7 lg:text-2xl text-base text-white ">
                    This Week
                </p>
            </div>
            <div class="flex  gap-2 md:p-3 p-1 hover:border-[#858584] border-b-2 border-[#3B3B3B] items-center ">
                <p class="font-semibold px-7 lg:text-2xl text-base text-white ">
                    This Month
                </p>
            </div>
            <div class="flex  gap-2 md:p-3 p-1 hover:border-[#858584] border-b-2 border-[#3B3B3B] items-center ">
                <p class="font-semibold px-7 lg:text-2xl text-base text-white ">
                   All Time
                </p>
            </div>
        </div>
    </div>
    
</body>

</html>
